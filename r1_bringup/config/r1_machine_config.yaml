# -------- 足回り ----------
r1_mecanum_node:
  # ros__parameters:
  #   # 50mm
  #   wheel_radius: 0.05
  #   # 586.6mm
  #   robot_length: 0.5886
  #   # 604mm
  #   robot_width: 0.604
  #   speed_limit: 30.0
  #   # モーターの出力は歯数が34（モーター側）と歯数が42（ホイール側）で組みあわせているので
  #   # 減速比は34 / 42 = 0.8095238095238095
  #   # ギア比で割った値がモーターの出力となる
  #   gear_ratio: 0.8095238095238095
  #   motor_inverse: [false, false, true, true]
  ros__parameters:
    # 37.5mm
    wheel_radius: 0.0375
    # 0.450mm
    robot_length: 0.450
    # 661mm
    robot_width: 0.661
    speed_limit: 75.0
    # モーターの出力は歯数が37（モーター側）と歯数が28（ホイール側）で組みあわせているので
    # 減速比は37 / 28 = 1.3214285714285714
    # ギア比で割った値がモーターの出力となる
    gear_ratio: 1.3214285714285714
    # motor_inverse: [false, true, true, false]
    motor_inverse: [true, false, false, true]
    use_imu: false
r1_odometry_node:
  ros__parameters:
    # 計測輪の半径[m]
    # 使ったオムニは小さい白オムニ
    # 適当に実測したパラメータなので、ずれてるかも
    wheel_radius: 0.025
    encoder_x_inverse: false
    encoder_y_inverse: true
    use_imu: false

# ---------- 回収機構 ----------
# linear motion node
r1_kfs_fx_node:
  ros__parameters:
    torque_threshold: 0.5 # Nm
    origin_detect_threshold_time: 0.5 # 秒
    # 原点検出のときは、0の方向に戻るので、負の速度にする
    output_detect_speed: -6.28 # rad/s
    pos_min: 0.0
    pos_max: 1.0
    # ギアが一周すると2*pi*15mm進むので、半径は15mm
    radius: 0.015
    inverse_motor: true
    use_low_switch: false
    use_high_switch: false
    inverse_low_switch_logic: false
    inverse_high_switch_logic: false
# linear motion node
r1_kfs_fz_node:
  ros__parameters:
    torque_threshold: 0.5 # Nm
    origin_detect_threshold_time: 0.5 # 秒
    # 原点検出のときは、0の方向に戻るので、負の速度にする
    output_detect_speed: -3.14 # rad/s
    pos_min: 0.0
    pos_max: 1.0
    # ギアが一周すると2*pi*15mm進むので、半径は15mm
    radius: 0.015
    inverse_motor: true
    use_low_switch: false
    use_high_switch: false
    inverse_low_switch_logic: false
    inverse_high_switch_logic: false
# angle motion node
r1_kfs_fyaw_node:
  ros__parameters:
    # torque_threshold: 0.5 # Nm
    torque_threshold: 0.2 # Nm
    origin_detect_threshold_time: 0.5 # 秒
    origin_detect_speed: -3.14 # rad/s
    angle_min: 0.0
    angle_max: 3.14
    # ギア比で割った値がモーターの角度指令値となる
    # 減速比は26 / 80 = 0.325
    gear_ratio: 0.325
    inverse_motor: false
    use_low_switch: false
    use_high_switch: false
    inverse_low_switch_logic: false
    inverse_high_switch_logic: false
