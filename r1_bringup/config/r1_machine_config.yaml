# linear motion node
# C610
r1_spear1_node:
  ros__parameters:
    timer_rate: 10.0
    # トルク検出時のしきい値
    torque_threshold: 0.5 # Nm
    # 通常位置モード時に Robomas の torque_lim として使う値
    normal_torque_limit: 1.0 # Nm
