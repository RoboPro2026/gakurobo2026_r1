# urg_node2のパラメータ参考：https://github.com/Hokuyo-aut/urg_node2/blob/f02d8af22db2a4322217f4c5803494f4ca2903ff/config/params_serial.yaml
urg_node2:
  ros__parameters:
    serial_port: /dev/ttyACM0
    serial_baud: 115200
    frame_id : 'laser'
    calibrate_time : false
    synchronize_time : false
    publish_intensity : false
    publish_multiecho : false
    error_limit : 4
    error_reset_period : 5.0
    diagnostics_tolerance : 0.05
    diagnostics_window_time : 5.0
    time_offset : 0.0
# -120~120
    angle_min : -2.07
    angle_max : 2.07
    skip : 1
    cluster : 2
slam_toolbox:
  ros__parameters:
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    # 動作中にマップを作るときはmapping、すでに作ったマップを使うときはlocalization
    mode: mapping
    transform_publish_period: 0.02
    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.1
