r1_main_node:
  ros__parameters:
    # ========== 足回り ==========
    chassis_max_velocity: 1.0
    chassis_max_omega: 1.57

    # ========== KFS回収 ==========
    # fx
    kfs_fx_normal_pos: 0.05
    kfs_fx_expand_pos: 0.5
    # fz
    kfs_fz_normal_pos: 0.02
    kfs_fz_low_pos: 0.02
    kfs_fz_middle_pos: 0.22
    kfs_fz_high_pos: 0.42
    kfs_fz_book_pos: 0.52
    # fyaw
    kfs_fyaw_normal_angle: 0.0
    kfs_fyaw_front_angle: 0.0
    kfs_fyaw_side_angle: 1.57
    kfs_fyaw_rear_angle: 3.14
    # rx
    kfs_rx_normal_pos: 0.05
    kfs_rx_expand_pos: 0.5
    # rz
    kfs_rz_normal_pos: 0.02
    kfs_rz_low_pos: 0.02
    kfs_rz_middle_pos: 0.22
    kfs_rz_high_pos: 0.42
    kfs_rz_book_pos: 0.52
    # ryaw
    kfs_ryaw_normal_angle: 0.0
    kfs_ryaw_front_angle: 0.0
    kfs_ryaw_side_angle: 1.57
    kfs_ryaw_rear_angle: 3.14

    # ========== 展開 ==========
    # R2昇降
    r2_lift_max_velocity: 15.0
    # front_expand
    front_expand_normal_pos: 0.0
    front_expand_expand_pos: 0.5
    # rear_expand
    rear_expand_normal_pos: 0.0
    rear_expand_expand_pos: 0.5

    # ========== ポール回収 ==========
    # pole_x1
    pole_x1_normal_pos: 0.275
    pole_x1_expand_pos: 0.0
    # pole_x2
    pole_x2_normal_pos: 0.275
    pole_x2_expand_pos: 0.0
    # pole_y
    pole_y_normal_pos: 0.0
    pole_y_collect_pos: 0.0
    pole_y_transfer1_pos: 0.10
    pole_y_transfer2_pos: 0.27
    pole_y_transfer3_pos: 0.0
    pole_y_transfer4_pos: 0.4
    # pole_roger
    pole_roger_normal_pos: 0.0
    pole_roger_expand_pos: 0.5
    # pole servo
    # servo1
    pole_servo1_normal_angle: 70
    pole_servo1_horizontal_angle: 186
    # servo2
    pole_servo2_normal_angle: 80
    pole_servo2_horizontal_angle: 180
    # servo3
    pole_servo3_normal_angle: 70
    pole_servo3_horizontal_angle: 180
    # servo4
    pole_servo4_normal_angle: 70
    pole_servo4_horizontal_angle: 185

    # ========== やり ==========
    # roger1
    spear_roger1_normal_pos: 0.0
    spear_roger1_combine_pos: 0.0
    spear_roger1_transfer_pos: 0.38
    # roger2
    spear_roger2_normal_pos: 0.0
    spear_roger2_combine_pos: 0.0
    # うまく動かないので、roger1より高くする
    spear_roger2_transfer_pos: 0.38
    # move
    spear_move_normal_pos: 0.0
    spear_move_combine_pos: 0.0
    spear_move_transfer_pos: 0.45
    # TODO: ここの名前わかりにくいので治す
    spear_move_valve1_pos: 0.0
    spear_move_valve2_pos: 0.2
    # rotate
    spear_rotate_normal_pos: 0.0
    spear_rotate_combine_angle: 3.3


# -------- 足回り ----------
r1_mecanum_node:
  ros__parameters:
  #   # 50mm
    wheel_radius: 0.05
  #   # 470mm
    robot_length: 0.470
  #   # 484mm
    robot_width: 0.484
    speed_limit: 75.0
  #   # モーターの出力は歯数が34（モーター側）と歯数が42（ホイール側）で組みあわせているので
  # モーターの出力は歯数が32（モーター側）と歯数が64（ホイール側）で組みあわせているので
  #   # 減速比は32 / 64 = 0.5
  #   # ギア比で割った値がモーターの出力となる
    gear_ratio: 0.5
    motor_inverse: [true, false, false, true]
    use_imu: true
r1_odometry_node:
  ros__parameters:
    # 計測輪の半径[m]
    # 使ったオムニは小さい白オムニ
    # 適当に実測したパラメータなので、ずれてるかも
    wheel_radius: 0.025
    encoder_x_inverse: false
    encoder_y_inverse: true
    use_imu: false

# ---------- KFS回収機構 ----------
# linear motion node
r1_kfs_fx_node:
  ros__parameters:
    torque_threshold: 0.5 # Nm
    origin_detect_threshold_time: 0.5 # 秒
    # 原点検出のときは、0の方向に戻るので、負の速度にする
    output_detect_speed: -6.28 # rad/s
    pos_min: 0.0
    pos_max: 1.0
    normal_pos: 0.05
    # ギアが一周すると2*pi*15mm進むので、半径は15mm
    radius: 0.015
    inverse_motor: true
    use_low_switch: false
    use_high_switch: false
    inverse_low_switch_logic: false
    inverse_high_switch_logic: false
# linear motion node
r1_kfs_fz_node:
  ros__parameters:
    torque_threshold: 0.5 # Nm
    origin_detect_threshold_time: 0.5 # 秒
