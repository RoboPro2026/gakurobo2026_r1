    speed_gain_i: [0.1, 0.1, 0.1, 0.1]
    speed_gain_d: [0.0, 0.0, 0.0, 0.0]
    # 位置制御のときはここのトルクリミットは適応されない。r1_linear_motion_nodeかr1_angle_motion_nodeのtorque_limitが適応される。
    torque_lim: [1.0, 1.0, 1.0, 4.0]
    pos_gain_p: [5.0, 5.0, 5.0, 5.0]
    pos_gain_i: [0.0, 0.0, 0.0, 0.0]
    pos_gain_d: [0.0, 0.0, 0.0, 0.0]
    speed_lim: [100.0, 100.0, 30.0, 30.0]
    # TRQ+SPD+POSをフィードバック
    monitor_reg1: [0x0001000100010000, 0x0001000100010000, 0x0001000100010000, 0x0001000100010000]
    # TRQ+SPD+POS+MOTOR_STATEをフィードバック
    # monitor_reg1: [0x0001000100010002, 0x0001000100010002, 0x0001000100010002, 0x0001000100010002]
    # VESCのフィードバックは無効化
    monitor_reg2: [0, 0, 0, 0]
