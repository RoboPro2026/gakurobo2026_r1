# 足回り メカナム
sabacan_robomasv2_node_id1:
  ros__parameters:
    board_id: 1
    enable_initialize: false
    publish_timer_rate: 100.0
    motor_type: ["VESC", "VESC", "VESC", "VESC"]
    control_type: ["CURRENT", "CURRENT", "CURRENT", "CURRENT"]
    # モータ番号0,1,2,3はフィードバックなし
    monitor_reg1: [0x0, 0x0, 0x0, 0x0]
#     # VESCの極数
    vesc_pole: [14, 14, 14, 14]
    # モータ番号0と1はMOTOR_STATE,ABS_SPD,ABS_POSをフィードバック
    # モータ番号2と3はMOTOR_STATEのみフィードバック
    # monitor_reg1: [0x0C00000000000002, 0x0C00000000000002, 0x2, 0x2]
    # VESC_CURRENT + VESC_ERPMをフィードバック
    monitor_reg2: [0x18, 0x18, 0x18, 0x18]
    monitor_period: 100
# 独ステホイール
# sabacan_robomasv2_node_id1:
#   ros__parameters:
#     board_id: 1
#     # 起動時に基板初期化シーケンスを流すかどうか。独ステは初期化を行わないとおかしくなるのでtrueにする。
#     # enable_initialize: true
#     enable_initialize: false
#     # status publish 周期 [Hz]
#     publish_timer_rate: 100.0
#     # 接続されているモータ種別
#     # board1: 0=右前タイヤ, 1=左前タイヤ, 2=左後タイヤ, 3=右後タイヤ
#     motor_type: ["VESC", "VESC", "VESC", "VESC"]
#     # 制御モード。安全のため初期値はCURRENTにする
#     control_type: ["CURRENT", "CURRENT", "CURRENT", "CURRENT"]
#     # VESCの極数
#     vesc_pole: [28, 28, 28, 28]
#     # VESCなので monitor_reg1は0。monitor_reg2はVESC_ERPMを有効。
#     monitor_reg1: [0x0, 0x0, 0x0,0x0]
#     monitor_reg2: [0x10, 0x10, 0x10, 0x10]
#     monitor_period: 100
# 独ステ旋回
sabacan_robomasv2_node_id2:
  ros__parameters:
    board_id: 2
    # 起動時に基板初期化シーケンスを流すかどうか。独ステは初期化を行わないとおかしくなるのでtrueにする。
    # enable_initialize: true
    enable_initialize: false
    # status publish 周期 [Hz]
    publish_timer_rate: 100.0
    # motor_number 0..3 に接続されているモータ種別
    # board2: 0=右前ステア, 1=左前ステア, 2=左後ステア, 3=右後ステア
    motor_type: ["C610", "C610", "C610", "C610"]
    # 制御モード。安全のため初期値はTORQUEにする
    control_type: ["TORQUE", "TORQUE", "TORQUE", "TORQUE"]
    # アブソリュートエンコーダの有効/無効。すべて有効にする
    abs_enc_en: [true, true, true, true]
    # アブソリュートエンコーダのギア比。反転する。
    abs_gear_ratio: [-1.0, -1.0, -1.0, -1.0]
    # 速度 P ゲイン。
    speed_gain_p: [0.5, 0.5, 0.5, 0.5]
    # 速度 I ゲイン。
    speed_gain_i: [0.1, 0.1, 0.1, 0.1]
    # 速度 D ゲイン。
    speed_gain_d: [0.0, 0.0, 0.0, 0.0]
    # トルク制限。
    torque_lim: [1.0, 1.0, 1.0, 1.0]
    # 位置 P ゲイン。
    pos_gain_p: [5.0, 5.0, 5.0, 5.0]
    # 位置 I ゲイン。
    pos_gain_i: [0.0, 0.0, 0.0, 0.0]
    # 位置 D ゲイン。
    pos_gain_d: [0.0, 0.0, 0.0, 0.0]
    # 速度上限。
    speed_lim: [6.28, 6.28, 6.28, 6.28]
    # アブソの回転回数、ステアがバグるのを防止するため、0に設定
    abs_turn_cnt: [0, 0, 0, 0]
    # VESCの極数
    vesc_pole: [0, 0, 0, 0]
    # monitor_reg1のABS_SPDとABS_POSを有効。monitor_reg2は無効
    monitor_reg1: [0x0C00000000000000, 0x0C00000000000000, 0x0C00000000000000,0x0C00000000000000]
    monitor_reg2: [0x0, 0x0, 0x0, 0x0]
    monitor_period: 100

# KFS回収前、昇降前
sabacan_robomasv2_node_id3:
  ros__parameters:
    board_id: 3
    enable_initialize: false
    publish_timer_rate: 10.0
    # kfs_fx, kfs_fz, kfs_fyaw, r2_flift
    motor_type: ["C610", "C610", "C610", "C620"]
