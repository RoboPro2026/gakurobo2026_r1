# IMU
bno086_node:
  ros__parameters:
    port: "/dev/ttyUSB0"

# 足回り
sabacan_robomasv2_node_id1:
  ros__parameters:
    board_id: 1
    motor_type: ["VESC", "VESC", "VESC", "VESC"]
    control_type: ["VELOCITY", "VELOCITY", "VELOCITY", "VELOCITY"]
    # モータ番号0と1はMOTOR_STATE,ABS_SPD,ABS_POSをフィードバック
    # モータ番号2と3はMOTOR_STATEのみフィードバック
    monitor_reg1: [0x0C00000000000002, 0x0C00000000000002, 0x2, 0x2]
    # VESC_CURRENT + VESC_ERPMをフィードバック
    monitor_reg2: [0x18, 0x18, 0x18, 0x18]
    monitor_period: 20

# KFS回収前、展開補助前
sabacan_robomasv2_node_id2:
  ros__parameters:
    board_id: 2
    motor_type: ["C610", "C610", "C610", "C610"]
    control_type: ["POS", "POS", "POS", "POS"]
    speed_gain_p: [0.5, 0.5, 0.5, 0.5]
    speed_gain_i: [0.2, 0.2, 0.2, 0.2]
    speed_gain_d: [0.0, 0.0, 0.0, 0.0]
    torque_lim: [5.0, 5.0, 5.0, 5.0]
    pos_gain_p: [6.0, 6.0, 6.0, 6.0]
    pos_gain_i: [3.0, 3.0, 3.0, 3.0]
    pos_gain_d: [0.0, 0.0, 0.0, 0.0]
    # speed_lim: [20.0, 20.0, 20.0, 20.0]
    speed_lim: [10.0, 10.0, 10.0, 10.0]
    # TRQ+SPD+POS+MOTOR_STATEをフィードバック
    monitor_reg1: [0x0001000100010002, 0x0001000100010002, 0x0001000100010002, 0x0001000100010002]
    # VESCのフィードバックは無効化
    monitor_reg2: [0, 0, 0, 0]
    monitor_period: 100
