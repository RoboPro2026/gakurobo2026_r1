    drive_mode: "mecanum"
    # シャーシ系フィードバックの publish_rate
    chassis_timer_rate: 10.0
    odometry_encoder_timer_rate: 100.0
    linear_motion_timer_rate: 10.0
    angle_motion_timer_rate: 10.0
