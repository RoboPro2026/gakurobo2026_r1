# urg_node2のパラメータ参考：https://github.com/Hokuyo-aut/urg_node2/blob/f02d8af22db2a4322217f4c5803494f4ca2903ff/config/params_serial.yaml
urg_node2:
  ros__parameters:
    serial_port: /dev/ttyACM0
    serial_baud: 115200
    frame_id : 'laser'
    calibrate_time : true
    synchronize_time : true
    publish_intensity : false
    publish_multiecho : false
    error_limit : 4
    error_reset_period : 5.0
    diagnostics_tolerance : 0.05
    diagnostics_window_time : 5.0
    time_offset : 0.0
# -120~120
    angle_min : -2.07
    angle_max : 2.07
    skip : 0
    cluster : 1
slam_toolbox:
  ros__parameters:
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    # 動作中にマップを作るときはmapping、すでに作ったマップを使うときはlocalization
    mode: mapping
    transform_publish_period: 0.02
    # map_update_interval: 0.5
    map_update_interval: 0.2
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.1
# スキャンマッチングの更新頻度と移動閾値
    minimum_travel_distance: 0.1    # 10cm動いたら更新
    minimum_travel_heading: 0.02     # 約1度回転したら更新（ここを小さくすると回転に敏感に反応します）
    
    # マッチングの精度向上
    use_scan_matching: true
    use_scan_barycenter: true
    
    # 探索範囲の設定（回転に弱い場合はここを調整）
    # 以下の値は標準的な値ですが、明示的に指定することで挙動を安定させます
    correlation_search_space_dimension: 1.0
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # ループクローズ（一周回ってきた時の補正）
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 10
