sabacan_gpio_node_id1:
  ros__parameters:
    board_id: 1
    # 0と1は真空ポンプなので、PWM出力
    pin_type: ["OUTPUT_PWM", "OUTPUT_PWM", "OUTPUT_PWM", "OUTPUT_PWM", "OUTPUT_PWM", "OUTPUT_PWM", "OUTPUT_PWM", "OUTPUT_PWM", "OUTPUT_PWM"]
    pwm_freq: [1000, 1000, 1000, 1000, 1000, 1000, 1000, 1000, 1000]
    # monitor_regは無効
    monitor_reg: 0
    monitor_period: 0

sabacan_gpio_node_id2:
  ros__parameters:
    board_id: 2
    pin_type: ["INPUT", "INPUT", "INPUT", "INPUT", "INPUT", "INPUT", "INPUT", "INPUT", "INPUT"]
    # monitor_regはPORT_READを有効化
    monitor_reg: 0x4
    monitor_period: 50

