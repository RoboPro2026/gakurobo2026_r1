r1_chassis_control_node:
  ros__parameters:
    # =========== r1_chassis_control_nodeの基本パラメータ ==========
    act_filebase_red: "src/gakurobo2026_r1/data/red/"
    act_filebase_blue: "src/gakurobo2026_r1/data/blue/"
    timer_rate: 100.0
    visualize_timer_rate: 10.0
    cmd_vel_topic: "/cmd_vel_target"
    # ========== 足回りの軌道追従に関するパラメータ ==========
    # trueのときはmap座標系を使用してtf変換を行う。falseのときはodom座標系を使用する
    # trueのときはLidarを使用し、falseのときはLidarは使用せずに制御する
    use_map: true
    search_radius: 0.2  # 最低先読み距離 [m]
    lookahead_time: 0.3 # 速度に応じて先読み距離を伸ばす時間 [s]
    # 位置制御のゲイン
    # 接線方向は軌道に沿って進むためのゲイン
    kp_pos_tangent_usual: 0.7
    ki_pos_tangent_usual: 0.0
    kd_pos_tangent_usual: 0.0
    kp_pos_tangent_goal: 1.3
    ki_pos_tangent_goal: 0.0
    kd_pos_tangent_goal: 0.0
    # 法線方向は軌道への横ずれを戻すためのゲイン
    kp_pos_normal_usual: 0.7
    ki_pos_normal_usual: 0.0
    kd_pos_normal_usual: 0.0
    kp_pos_normal_goal: 1.3
    ki_pos_normal_goal: 0.0
    kd_pos_normal_goal: 0.0
    vel_i_limit: 0.3
    vel_output_limit: 2.5
    # 角度制御のゲイン
    kp_angle_usual: 1.0
    ki_angle_usual: 0.0
    kd_angle_usual: 0.0
    kp_angle_goal: 1.3
    ki_angle_goal: 0.0
    kd_angle_goal: 0.0
    omega_i_limit: 0.2
    omega_output_limit: 2.0
    # 制御の終了判定閾値
    goal_pos_range: 0.03
    goal_angle_range: 0.03
    finish_time_threshold: 0.5
    enable_visualization: true
    arrow_scale: 3.0
    # ========== robot_moveのパラメータ ==========
    # 減速範囲の長方形サイズ [m]
    # yaw=0 のとき width は map の x 方向、height は map の y 方向の長さになる
    # yaw を与えた場合は、その yaw だけ回転した長方形ローカル座標系での幅と高さになる
    decel_height: 0.45
    decel_width: 1.5
    # 内回り/外回りの減速範囲の中心座標 [x, y, yaw]
    # 内回りのときは2,1,4,7,10を通る
    red_inner_decel_center_pos:
      1: [3.4, 2.58, 0.0]
      2: [2.2, 2.58, 0.0]
      3: [100.0, 100.0, 0.0] # ここは通らない
      4: [5.4, 4.3, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      5: [100.0, 100.0, 0.0] # ここにはKFSは置かれない
      6: [100.0, 100.0, 0.0] # ここは通らない
      7: [5.4, 5.5, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      8: [100.0, 100.0, 0.0] # ここにはKFSは置かれない
      9: [100.0, 100.0, 0.0] # ここは通らない
      10: [5.4, 6.7, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      11: [100.0, 100.0, 0.0] # ここは通らない
      12: [100.0, 100.0, 0.0] # ここは通らない
    blue_inner_decel_center_pos:
      1: [-3.4, 2.58, 3.141592653589793]
      2: [-2.2, 2.58, 3.141592653589793]
      3: [-100.0, 100.0, 0.0] # ここは通らない
      4: [-5.4, 4.2, 1.5707963267948966]
      5: [-100.0, 100.0, 0.0] # ここにはKFSは置かれない
      6: [-100.0, 100.0, 0.0] # ここは通らない
      7: [-5.4, 5.4, 1.5707963267948966]
      8: [-100.0, 100.0, 0.0] # ここにはKFSは置かれない
      9: [-100.0, 100.0, 0.0] # ここは通らない
      10: [-5.4, 6.6, 1.5707963267948966]
      11: [-100.0, 100.0, 0.0] # ここは通らない
      12: [-100.0, 100.0, 0.0] # ここは通らない
    # 外回りのときは3,6,9,12,10,11を通る
    red_outer_decel_center_pos:
      1: [100.0, 100.0, 0.0] # ここは通らない
      2: [100.0, 100.0, 0.0] # ここは通らない
      3: [0.6, 3.0, 1.5707963267948966] # セコムの赤ゾーンが傾いてるから少し値を調整した
      4: [100.0, 100.0, 0.0] # ここは通らない
      5: [100.0, 100.0, 0.0] # ここにはKFSは置かれない
      6: [0.6, 4.2, 1.5707963267948966] # セコムの赤ゾーンが傾いてるから少し値を調整した
      7: [100.0, 100.0, 0.0] # ここは通らない
      8: [100.0, 100.0, 0.0] # ここにはKFSは置かれない
      9: [0.6, 5.4, 1.5707963267948966] # セコムの赤ゾーンが傾いてるから少し値を調整した
      10: [3.4, 8.55, 0.0]
      11: [2.2, 8.55, 0.0]
      12: [0.6, 6.7, 1.5707963267948966] # セコムの赤ゾーンが傾いてるから少し値を調整した
    blue_outer_decel_center_pos:
      1: [-100.0, 100.0, 0.0] # ここは通らない
      2: [-100.0, 100.0, 0.0] # ここは通らない
      3: [-0.6, 3.0, 1.5707963267948966]
      4: [-100.0, 100.0, 0.0] # ここは通らない
      5: [-100.0, 100.0, 0.0] # ここにはKFSは置かれない
      6: [-0.6, 4.2, 1.5707963267948966]
      7: [-100.0, 100.0, 0.0] # ここは通らない
      8: [-100.0, 100.0, 0.0] # ここにはKFSは置かれない
      9: [-0.6, 5.4, 1.5707963267948966]
      10: [-3.4, 8.55, 3.141592653589793]
      11: [-2.2, 8.55, 3.141592653589793]
      12: [-0.6, 6.6, 1.5707963267948966]
    # KFS回収時のオフセット（front_kfsかrear_kfsのうち、遠い方に適応する）
    collect_kfs_offset: 0.838
    # 減速時の速度
    decel_speed: 0.2
r1_chassis_velocity_control_node:
  ros__parameters:
    # true のとき input_cmd_vel_topic と /odometry から PID 補正した output_cmd_vel_topic を出す

   # メカナムのときはtrue,ステアのときは安定しなかったのでfalse
    enable_velocity_pid: false
    control_rate: 100.0
    input_cmd_vel_topic: "/cmd_vel_target"
    output_cmd_vel_topic: "/cmd_vel"
    kp_vx: 0.4
    ki_vx: 0.02
    kd_vx: 0.0
    integral_limit_vx: 0.35
    output_limit_vx: 2.0
    kp_vy: 0.4
    ki_vy: 0.02
    kd_vy: 0.0
    integral_limit_vy: 0.35
    output_limit_vy: 2.0
    kp_omega: 0.4
    ki_omega: 0.02
    kd_omega: 0.0
    integral_limit_omega: 0.35
    output_limit_omega: 2.0
r1_main_node:
  ros__parameters:
    # 起動モード。manual のとき MANUAL/MODE1_DETECT_ORIGIN、
    # auto のとき AUTO/ACT0 で開始する
    robot_control_mode: "manual"
    cmd_vel_topic: "/cmd_vel_target"
    timer_rate: 100.0
    ps4_connection_timeout: 1.0
    # true のとき、自動走行中（ACT2/ACT3/ACT4/ACT5）に右スティック単押しで一時停止（ポーズ）できる
    # false のとき、右スティック単押しで従来通り自動走行を中断する
    enable_right_stick_pause: false
    # PSボタンを押されたら、lidarをactivateするかどうか
    activate_lidar_on_ps: true
    share_long_press_sec: 0.4  # shareボタン長押し判定秒数 [s]
    # /initialpose publish後に現在のTFをログするまでの遅延 [s]
    initialpose_tf_log_delay_sec: 5.0
    # /initialpose の再送遅延 [s]（LiDAR lifecycle 起動の非同期性に対応するため複数回送信する）
    initialpose_retry1_delay_sec: 1.0
    initialpose_retry2_delay_sec: 3.0
    # ========== 足回り ==========

    chassis_make_spear_velocity: 0.2
    chassis_make_spear_omega: 0.2
    # 通常動作時の最大速度
    chassis_max_velocity: 0.6
    chassis_max_omega: 0.5
    # ========== KFS回収 ==========
    # 現状だと、fx,fz,rx,rzのnormal_torqueが1Nmになっていて、長時間接触しているとC610が止まるので、falseにする
    # normal_torqueをもう少し低くできれば、trueにする予定
    use_kfs_mech_lock: false
    # fx
    kfs_fx_normal_pos: 0.005
    kfs_fx_storage_pos: 0.01
    kfs_fx_start_pos: 0.005
    kfs_fx_put_pos: 0.45
    kfs_fx_expand_pos: 0.67
    kfs_fx_low_mech_lock_pos: 0.05
    kfs_fx_high_mech_lock_pos: 0.67
    kfs_fx_r2_lift_pos: 0.35
    # fz
    kfs_fz_normal_pos: 0.005
    kfs_fz_low_pos: 0.005
    kfs_fz_middle_pos: 0.22
    kfs_fz_high_pos: 0.42
    kfs_fz_put_pos: 0.525
    kfs_fz_storage_pos: 0.5
    kfs_fz_start_pos: 0.6
    kfs_fz_low_mech_lock_pos: 0.005
    kfs_fz_high_mech_lock_pos: 0.65
    kfs_fz_r2_lift_pos: 0.005
    # fyaw
    kfs_fyaw_normal_angle: 0.0
    kfs_fyaw_front_angle: 3.141592653589793
    kfs_fyaw_side_angle: 1.5707963267948966
    kfs_fyaw_rear_angle: 0.0
    kfs_fyaw_start_angle: 1.5707963267948966
    kfs_fyaw_low_mech_lock_angle: 0.05
    kfs_fyaw_high_mech_lock_angle: 3.1
    # rx
    kfs_rx_normal_pos: 0.005
    kfs_rx_storage_pos: 0.01
    kfs_rx_start_pos: 0.005
    kfs_rx_put_pos: 0.45
    kfs_rx_expand_pos: 0.67
    kfs_rx_low_mech_lock_pos: 0.05
    kfs_rx_high_mech_lock_pos: 0.67
    kfs_rx_r2_lift_pos: 0.35
    # rz
    kfs_rz_normal_pos: 0.005
    kfs_rz_low_pos: 0.005
    kfs_rz_middle_pos: 0.22
    kfs_rz_high_pos: 0.42
    kfs_rz_storage_pos: 0.5
    kfs_rz_put_pos: 0.525
    kfs_rz_start_pos: 0.6
    kfs_rz_low_mech_lock_pos: 0.005
    kfs_rz_high_mech_lock_pos: 0.65
    kfs_rz_r2_lift_pos: 0.005
    # ryaw
    kfs_ryaw_normal_angle: 0.0
    kfs_ryaw_front_angle: 3.141592653589793
    kfs_ryaw_side_angle: 1.5707963267948966
    kfs_ryaw_rear_angle: 0.0
    kfs_ryaw_start_angle: 1.5707963267948966
    kfs_ryaw_low_mech_lock_angle: 0.05
    kfs_ryaw_high_mech_lock_angle: 3.1

    # ========== 展開 ==========
    # R2昇降
    r2_flift_normal_pos: 0.05
    r2_flift_up_pos: 0.65
    r2_flift_down_pos: 0.0
    r2_lift_normal_pos: 0.05
    r2_rlift_up_pos: 0.65
    r2_rlift_down_pos: 0.0

    # ========== やり ==========
    # 大槻機構
    spear_y_normal_pos: 0.05
    spear_y_collect1_pos: 0.07
    spear_y_collect2_pos: 0.17
    spear_y_make_spear_pos: 0.44
    spear_y_low_attack_pos: 0.65
    spear_y_middle_attack_pos: 0.65
    spear_y_high_attack_pos: 0.74
    spear_y_throw_away_pos: 0.05
    spear_roll1_normal_angle: 0.0
    spear_roll1_vertical_angle: 0.0
    spear_roll1_horizontal_angle: 1.5707963267948966
    spear_roll1_inv_horizontal_angle: -1.5707963267948966
    red_spear_roll1_low_attack_angle: -1.5707963267948966
    red_spear_roll1_middle_attack_angle: -1.0
    red_spear_roll1_high_attack_angle: -0.8
    blue_spear_roll1_low_attack_angle: 1.5707963267948966
    blue_spear_roll1_middle_attack_angle: 1.0
    blue_spear_roll1_high_attack_angle: 0.8
    spear_roll2_normal_angle: 0.0
    spear_roll2_vertical_angle: 0.0
    spear_roll2_horizontal_angle: 1.5707963267948966
    spear_roll2_inv_horizontal_angle: -1.5707963267948966
    red_spear_roll2_low_attack_angle: -1.5707963267948966
    red_spear_roll2_middle_attack_angle: -1.0
    red_spear_roll2_high_attack_angle: -0.8
    blue_spear_roll2_low_attack_angle: 1.5707963267948966
    blue_spear_roll2_middle_attack_angle: 1.0
    blue_spear_roll2_high_attack_angle: 0.8
    # 千田機構
    # # spear1
    # spear1_normal_pos: 0.05
    # # ポールを掴む位置
    # spear1_collect1_pos: 0.25
    # # ポールを掴んでちょっとだけ上げたときの位置
    # spear1_collect2_pos: 0.35
    # # ポールを受け渡す位置
    # spear1_collect3_pos: 0.55
    # # KFS回収中に機構が当たらないようにする位置
    # spear1_kfs_collect_pos: 0.6
    # spear1_low_attack_pos: 0.6
    # spear1_middle_attack_pos: 0.6
    # spear1_high_attack_pos: 0.8
    # spear1_make_spear_start_pos: 0.35
    # # スピアを押し込むときの速度[rad/s]
    # spear1_push_vel: 10.0
    # # spear2
    # spear2_normal_pos: 0.05
    # # ポールを掴む位置
    # spear2_collect1_pos: 0.25
    # # ポールを掴んでちょっとだけ上げたときの位置
    # spear2_collect2_pos: 0.35
    # # ポールを受け渡す位置
    # spear2_collect3_pos: 0.55
    # # KFS回収中に機構が当たらないようにする位置
    # spear2_kfs_collect_pos: 0.6
    # spear2_low_attack_pos: 0.6
    # spear2_middle_attack_pos: 0.6
    # spear2_high_attack_pos: 0.8
    # spear2_make_spear_start_pos: 0.35
    # # スピアを押し込むときの速度[rad/s]
    # spear2_push_vel: 10.0
    # # spear3
    # spear3_normal_pos: 0.0
    # spear3_collect_pos: 0.0
    # # KFS回収中に機構が当たらないようにする位置
    # spear3_kfs_collect_pos: 0.6
    # spear3_make_spear_start_pos: 0.0
    # # スピアを押し込むときの速度[rad/s]
    # spear3_push_vel: 10.0
    # # spear4
    # spear4_normal_pos: 0.0
    # spear4_collect_pos: 0.0
    # # KFS回収中に機構が当たらないようにする位置
    # spear4_kfs_collect_pos: 0.6
    # spear4_make_spear_start_pos: 0.0
    # # スピアを押し込むときの速度[rad/s]
    # spear4_push_vel: 10.0
    # # spear_x
    # spear_x_normal_pos: 0.0
    # spear_x_middle_pos: 0.15
    # spear_x_make_spear1_pos: 0.15
    # # spear_x_make_spear2_pos: 0.305
    # spear_x_make_spear2_pos: 0.285
    # spear_x_make_spear3_pos: 0.0
    # spear_x_make_spear4_pos: 0.0
    # # spear_y
    # spear_y_normal_pos: 0.0
    # spear_y_expand_pos: 0.1
    # # spear_roll
    # spear_roll_normal_angle: 0.0
    # spear_roll_inv_normal_angle: 3.14159265358979326
    # spear_roll_vertical_angle: 1.5707963267948966
    # # spear_roll_vertical_angle: 1.62
    # spear_roll_low_attack_angle: 0.0
    # spear_roll_middle_attack_angle: 2.07
    # spear_roll_high_attack_angle: 2.27
    # # spear_pitch1
    # # デフォルトで少しだけ位置を上げる
    # spear_pitch1_normal_angle: 0.1
    # spear_pitch1_vertical_angle: 0.1
    # # spear_pitch2
    # # デフォルトで少しだけ位置を上げる
    # spear_pitch2_normal_angle: 0.1
    # spear_pitch2_vertical_angle: 0.1
    # ========== KFS回収の移動関連 ==========
    # KFSが置かれている場所
    # KFS回収範囲の長方形サイズ [m]
    # yaw=0 のとき width は map の x 方向、height は map の y 方向の長さになる
    # yaw を与えた場合は、その yaw だけ回転した長方形ローカル座標系での幅と高さになる
    collect_kfs_height: 0.3
    # collect_kfs_width: 0.6
    collect_kfs_width: 0.6
    # false にすると auto_collect_kfs_task は範囲判定と LED 更新だけ行い、
    # KFS の位置・yaw・ポンプ・バルブ指令は出さない
    enable_auto_collect_kfs_actuator: true
    # KFS回収時に一時停止するか
    enable_stop_before_collect_kfs_: true
    # KFS回収時にセンサーを用いたの回収にするか。
    # trueのときはセンサーを用いた回収、falseのときは座標を用いた回収になる
    enable_wall_sensor: false
    # 壁検出時に止まるようにするか。
    # 壁検出センサーの距離閾値 [m]
    wall_sensor_distance_threshold: 0.5
    # 壁検出センサーの反応時間閾値
    wall_sensor_time_threshold: 0.15
    # 壁検出後に回収動作をしながら移動する距離 [m]
    # その間は進行方向に進み続ける。
    move_distance_after_wall_detected: 0.4
    # 壁の検出範囲のサイズ [m]
    wall_sensor_detect_height: 0.3
    wall_sensor_detect_width: 0.6
    # 壁検出の遅延距離オフセット [m]
    # センサーが反応したときに展開すると回収機構がぶつかる方のセンサーに適用される
    wall_sensor_delay_offset_distance: 0.15
    # KFS回収完了後、次に同じ回収機構が回収動作を行うまでのインターバル時間 [s]
    collect_kfs_interval_time: 5.0
    # 内回り/外回りのKFS回収範囲の中心座標 [x, y, yaw]
    # 内回りのときは2,1,4,7,10を通る
    red_inner_collect_kfs_center_pos:
      1: [3.4, 2.58, 0.0]
      2: [2.2, 2.58, 0.0]
      3: [100.0, 100.0, 0.0] # ここは通らない
      4: [5.4, 4.3, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      5: [100.0, 100.0, 0.0] # ここにはKFSは置かれない
      6: [100.0, 100.0, 0.0] # ここは通らない
      7: [5.4, 5.5, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      8: [100.0, 100.0, 0.0] # ここにはKFSは置かれない
      9: [100.0, 100.0, 0.0] # ここは通らない
      10: [5.4, 6.7, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      11: [100.0, 100.0, 0.0] # ここは通らない
      12: [100.0, 100.0, 0.0] # ここは通らない
    blue_inner_collect_kfs_center_pos:
      1: [-3.4, 2.58, 3.141592653589793]
      2: [-2.2, 2.58, 3.141592653589793]
      3: [-100.0, 100.0, 0.0] # ここは通らない
      4: [-5.4, 4.2, 1.5707963267948966]
      5: [-100.0, 100.0, 0.0] # ここにはKFSは置かれない
      6: [-100.0, 100.0, 0.0] # ここは通らない
      7: [-5.4, 5.4, 1.5707963267948966]
      8: [-100.0, 100.0, 0.0] # ここにはKFSは置かれない
      9: [-100.0, 100.0, 0.0] # ここは通らない
      10: [-5.4, 6.6, 1.5707963267948966]
      11: [-100.0, 100.0, 0.0] # ここは通らない
      12: [-100.0, 100.0, 0.0] # ここは通らない
    # 外回りのときは3,6,9,12,10,11を通る
    red_outer_collect_kfs_center_pos:
      1: [100.0, 100.0, 0.0] # ここは通らない
      2: [100.0, 100.0, 0.0] # ここは通らない
      3: [0.6, 3.0, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      4: [100.0, 100.0, 0.0] # ここは通らない
      5: [100.0, 100.0, 0.0] # ここにはKFSは置かれない
      6: [0.6, 4.2, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      7: [100.0, 100.0, 0.0] # ここは通らない
      8: [100.0, 100.0, 0.0] # ここにはKFSは置かれない
      9: [0.6, 5.4, 1.5707963267948966] # セコムの赤ゾーンが傾いてるからか、+0.1しないと合わない
      10: [3.4, 8.55, 0.0]
      11: [2.2, 8.55, 0.0]
      12: [0.6, 6.7, 1.5707963267948966]
    blue_outer_collect_kfs_center_pos:
      1: [-100.0, 100.0, 0.0] # ここは通らない
      2: [-100.0, 100.0, 0.0] # ここは通らない
      3: [-0.6, 3.0, 1.5707963267948966]
      4: [-100.0, 100.0, 0.0] # ここは通らない
      5: [-100.0, 100.0, 0.0] # ここにはKFSは置かれない
      6: [-0.6, 4.2, 1.5707963267948966]
      7: [-100.0, 100.0, 0.0] # ここは通らない
      8: [-100.0, 100.0, 0.0] # ここにはKFSは置かれない
      9: [-0.6, 5.4, 1.5707963267948966]
      10: [-3.4, 8.55, 3.141592653589793]
      11: [-2.2, 8.55, 3.141592653589793]
      12: [-0.6, 6.6, 1.5707963267948966]
    collect_kfs_offset: 0.838 # KFS回収時のオフセット（front_kfsかrear_kfsのうち、遠い方に適応する）
    # 回収するときの遅延時間
    kfs_yaw_delay_time: 0.5

# -------- 足回り ----------
r1_mecanum_node:
  ros__parameters:
  #   # 50mm
    wheel_radius: 0.05
  #   # 828mm
    robot_length: 0.828
  #   # 802mm
    robot_width: 0.802
    speed_limit: 100.0
  # モーターの出力は歯数が32（モーター側）と歯数が64（ホイール側）で組みあわせているので
  #   # 減速比は32 / 64 = 0.5
  #   # ギア比で割った値がモーターの出力となる
    gear_ratio: 0.5
    motor_inverse: [false, false, false, false]
    use_imu: true
r1_swerve_drive_node:
  ros__parameters:
    robot_length: 0.8
    robot_width: 0.8
    # 駆動輪半径 [m]
    wheel_radius: 0.04
    # wheel 側の減速比
    wheel_gear_ratio: 1.0
    # steer 側の減速比
    steer_gear_ratio: 1.0
    # wheel 角速度指令の上限
    wheel_speed_limit: 100.0
    # steer 角度指令の上限 [rad]
    steer_angle_limit: 6.28
    # 操舵反転判定に使う角度差しきい値 [rad]
    # angle_diff_range: 0.5
    # linear.x, linear.y をゼロ近傍とみなすしきい値
    zero_velocity_threshold: 0.01
    # angular.z をゼロ近傍とみなすしきい値
    zero_omega_threshold: 0.01
    # 各 steer 軸のゼロ点補正 [rad]
    # 順序は [fr, fl, rl, rr]
    steer_theta_offset: [1.5661944150924683, -2.3700003623962402, 1.5109710693359375, 0.6120583415031433]
    # 各 wheel モータの回転方向反転設定
    # 順序は [fr, fl, rl, rr]
    wheel_motor_inverse: [false, false, false, false]
    # 各 steer モータの回転方向反転設定
    # 順序は [fr, fl, rl, rr]
    steer_motor_inverse: [false, false, false, false]
    # true の場合は IMU を使って姿勢補正を行う
    use_imu: true
r1_odometry_node:
  ros__parameters:
    timer_rate: 100.0
    # 計測輪の半径[m]
    # 使ったオムニは小さい白オムニ
    # 適当に実測したパラメータなので、ずれてるかも
    wheel_radius: 0.025
    # wheel_radius: 0.0125
    encoder_x_inverse: false
    encoder_y_inverse: true
    use_imu: true
# ---------- KFS回収機構 ----------
# linear motion node
r1_kfs_fx_node:
  ros__parameters:
    timer_rate: 10.0
    # トルク検出時のしきい値
    torque_threshold: 0.5 # Nm
    # 通常位置モード時に Robomas の torque_lim として使う値
    normal_torque_limit: 0.7 # Nm
    # 原点検出・メカロック移動中に Robomas の torque_lim として使う値
    contact_torque_limit: 0.7 # Nm
    origin_detect_threshold_time: 0.5 # 秒
    # 原点検出のときは、0の方向に戻るので、負の速度にする
    origin_detect_speed: -10.0 # rad/s
    move_mech_lock_speed: 10.0 # rad/s
    pos_min: -0.1
    pos_max: 1.0
    normal_pos: 0.005
    # ギアが一周すると2*pi*15mm進むので、半径は15mm
    radius: 0.015
    inverse_motor: true
    use_low_switch: false
    use_high_switch: false
    inverse_low_switch_logic: false
    inverse_high_switch_logic: false
# linear motion node
r1_kfs_fz_node:
  ros__parameters:
    timer_rate: 10.0
    # トルク検出時のしきい値
