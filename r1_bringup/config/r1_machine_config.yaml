  ros__parameters:
    # torque_threshold: 0.5 # Nm
    torque_threshold: 0.2 # Nm
    origin_detect_threshold_time: 0.5 # 秒
    origin_detect_speed: -3.14 # rad/s
    angle_min: -5.0
    angle_max: 5.0
    normal_angle: 0.0
    # ギア比で割った値がモーターの角度指令値となる
    # 減速比は26 / 80 = 0.325
    gear_ratio: 0.325
