    pos_min: -0.1
    pos_max: 1.0
    normal_pos: 0.05
    # ギアが一周すると2*pi*14.325mm進むので、半径は14.325mm
    radius: 0.014325
    inverse_motor: true
    use_low_switch: false
    use_high_switch: false
    inverse_low_switch_logic: false
    inverse_high_switch_logic: false
